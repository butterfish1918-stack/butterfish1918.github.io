  <body>
    <div id="root">
      <main class="runner-status">Loading pasted React app...</main>
    </div>
    <script>
      const root = document.getElementById('root');
      const escapeHtml = (value) => String(value).replace(/[&<>]/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[ch]));
      const showError = (error) => {
        root.innerHTML = `
          <main class="runner-error">
            <section>
              <h1>Startup error</h1>
              <pre>${escapeHtml(error && (error.stack || error.message) || error)}</pre>
            </section>
          </main>`;
      };

      const toKebab = (value) => value.replace(/[A-Z]/g, (match, index) => `${index ? '-' : ''}${match.toLowerCase()}`);
      const makeIcon = (name) => {
        const Icon = ({ size = 16, className = '', ...props }) => React.createElement(
          'span',
          { ...props, className: `runner-icon ${className || ''}`.trim(), title: props.title || name, style: { width: size, height: size, ...(props.style || {}) } },
          React.createElement('svg', { viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round', 'aria-hidden': 'true' },
            ...((window.lucide && window.lucide[name]) || []).map(([tag, attrs], index) => React.createElement(tag, { key: index, ...Object.fromEntries(Object.entries(attrs || {}).map(([key, value]) => [key === 'stroke-width' ? 'strokeWidth' : key === 'stroke-linecap' ? 'strokeLinecap' : key === 'stroke-linejoin' ? 'strokeLinejoin' : toKebab(key) === key ? key : key, value])) }))
          )
        );
        Icon.displayName = name;
        return Icon;
      };

      const iconNames = [
        'Skull','Scroll','Feather','ArrowRightLeft','Download','Upload','X','Search','Globe','ChevronRight',
        'Sparkles','Flame','Clipboard','Languages','Zap','BookOpen','ChevronLeft','Plus','Volume2','Split',
        'AlignJustify','Database','Network','Trash2','Library','AlertCircle','Eye','EyeOff',
        'VolumeX','Save','RotateCcw','CheckCircle','XCircle','Quote','Keyboard','Activity','FileSpreadsheet',
        'SkipForward','Trophy','Award','AlertTriangle','BrainCircuit','Ghost','Moon','Scale','RefreshCw','Filter','Info'
      ];

      const firebaseMocks = `
const initializeApp = (config = {}) => ({ config });
const getAuth = () => ({});
const signInWithCustomToken = async () => ({ user: null });
const signInAnonymously = async () => ({ user: null });
const onAuthStateChanged = (_auth, callback) => {
  const id = window.setTimeout(() => callback(null), 0);
  return () => window.clearTimeout(id);
};
const getFirestore = () => ({});
const collection = (...path) => ({ path });
const doc = (...path) => ({ path });
const setDoc = async () => {};
const deleteDoc = async () => {};
const updateDoc = async () => {};
const getDocs = async () => ({ docs: [], forEach: () => {} });
const addDoc = async () => ({ id: crypto.randomUUID?.() || String(Date.now()) });
const writeBatch = () => ({ set() {}, delete() {}, update() {}, commit: async () => {} });
const increment = (value) => value;
const onSnapshot = (_ref, callback) => {
  const id = window.setTimeout(() => callback({ docs: [], forEach: () => {} }), 0);
  return () => window.clearTimeout(id);
};
`;

      const boot = async () => {
        if (!window.React || !window.ReactDOM || !window.Babel) {
          throw new Error('Local React/Babel runtime did not load.');
        }

        const response = await fetch('/src/App.jsx?offline=' + Date.now());
        if (!response.ok) throw new Error('Could not load App.jsx: ' + response.status);
        let source = await response.text();

        source = source
          .replace(/import\s+React,\s*\{([^}]*)\}\s+from\s+['"]react['"];\s*/g, 'const { $1 } = React;\n')
          .replace(/import\s+\{[\s\S]*?\}\s+from\s+['"]lucide-react['"];\s*/g, iconNames.map(name => `const ${name} = window.__icons.${name};`).join('\n') + '\n')
          .replace(/import\s+\{\s*initializeApp\s*\}\s+from\s+['"]firebase\/app['"];\s*/g, '')
          .replace(/import\s+\{[\s\S]*?\}\s+from\s+['"]firebase\/auth['"];\s*/g, '')
          .replace(/import\s+\{[\s\S]*?\}\s+from\s+['"]firebase\/firestore['"];\s*/g, '')
          .replace(/export\s+default\s+App\s*;?\s*$/m, '');

        window.__icons = Object.fromEntries(iconNames.map(name => [name, makeIcon(name)]));

        const bootstrap = `
${firebaseMocks}
${source}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
`;

        const compiled = Babel.transform(bootstrap, {
          presets: [['react', { runtime: 'classic' }]],
          filename: 'App.offline.jsx',
          sourceType: 'script'
        }).code;

        Function('React', 'ReactDOM', compiled)(window.React, window.ReactDOM);
      };

      boot().catch(showError);
    </script>
